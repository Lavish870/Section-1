<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <link href="https://fonts.googleapis.com/css?family=Roboto:100,200,300,regular,500,600,700,800,900,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic" rel="stylesheet" />

    <style>
        *{
            font-family: Roboto;
        }
        .card{
            /*border: 1px solid red;*/
            width: 20%;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 3px 3px 10px 0px rgba(0, 0, 0, 0.600);
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div class="card">

        <h3>Login Form</h3>
        <form>
            <label for="">Email Address</label>
            <input type="email" class="text-input">

            <br><br>

            <label for="">Password</label>
            <input type="password" class="text-input">
            <br><br>

            <button class="btn-submit">Submit</button>
        </form>
    </div>
    
</body>
</html>
